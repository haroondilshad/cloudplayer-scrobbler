<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="../css/popup.css">
    <script src="../js/jquery-1.7.min.js"></script>
    <script src="../js/md5.ts"></script>
    <script src="../js/lastfm.ts"></script>
    <script src="../js/util.ts"></script>
    <script src="../js/popup.ts"></script>
</head>
<body>
    <div id="alert" class="hidden">
        <div class="alert-content">
            <span class="alert-text">
                Keyboard shortcuts are now available. To edit them, go to
                <a id="extns_link" href="#">chrome://extensions</a> and click
                "Keyboard shortcuts" at the bottom right of the page.
            </span>
            <a id="dismiss_alert" href="#" class="dismiss-btn">×</a>
        </div>
    </div>
    
    <div id="content">
        <div id="main">
            <div id="cover-box">
                <img id="cover" alt="Album cover"/>
            </div>
            <div id="song">
                <div id="now-playing">
                    <span id="artist"></span>
                    <span class="separator">–</span>
                    <span id="track"></span>
                </div>
                <div id="album"></div>
                <div id="controls">
                    <div id="lastfm-buttons">
                        <span id="love-button"></span>
                    </div>
                    <div id="player-controls">
                        <a id="prev-btn" href="#" title="Previous"></a>
                        <a id="play-pause-btn" href="#" title="Play/Pause"></a>
                        <a id="next-btn" href="#" title="Next"></a>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="bottom">
            <div class="status-row">
                <div id="scrobbling"></div>
                <div id="lastfm-profile"></div>
            </div>
            
            <div class="sync-section">
                <div class="sync-header">
                    <h3>Sync History</h3>
                    <a id="options-link" href="#" title="Open Options" class="options-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1 1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </a>
                </div>
                
                <div id="sync-history">
                    <div id="sync-date-controls">
                        <label class="sync-label">Sync from:</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="sync-from-now" name="sync-date" value="now" checked>
                                <label for="sync-from-now">Since last sync</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="sync-from-date" name="sync-date" value="custom">
                                <label for="sync-from-date">Custom date:</label>
                                <input type="date" id="custom-sync-date" class="date-input" disabled>
                            </div>
                        </div>
                    </div>
                    <button id="sync-history-btn" class="sync-btn">Sync History</button>
                    <div id="sync-status" class="sync-status hidden"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
