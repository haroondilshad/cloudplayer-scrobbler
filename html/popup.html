<head>
    <link rel="stylesheet" type="text/css" href="../css/popup.css">

    <script src="../js/jquery-1.7.min.js"></script>
    <script src="../js/md5.js"></script>
    <script src="../js/lastfm.js"></script>
    <script src="../js/util.js"></script>
    <script src="../js/popup.js"></script>
</head>
<body>
    <div id="alert" class="hidden">
        Keyboard shortcuts are now available. To edit them, go to
        <a id="extns_link" href="#">chrome://extensions</a> and click
        "Keyboard shortcuts" at the bottom right of the page.
        (<a id="dismiss_alert" href="#">dismiss</a>)
    </div>
    <div id="content">
        <div id="main">
            <div id="cover-box">
                <img id="cover"/>
            </div>
            <div id="song">
                <span id="now-playing">
                    <span id="artist"></span>&nbsp;-&nbsp;
                    <span id="track"></span>
                </span>
                <div id="album"></div>
                <div id="controls">
                    <span id="lastfm-buttons">
                        <span id="love-button"></span>
                        &nbsp;&nbsp;&nbsp;
                    </span>
                    <span id="player-controls">
                        <a id="prev-btn" href="#"></a>
                        &nbsp;&nbsp;&nbsp;
                        <a id="play-pause-btn" href="#"></a>
                        &nbsp;&nbsp;&nbsp;
                        <a id="next-btn" href="#"></a>
                    </span>
                </div>
            </div>
        </div>
        <div class="clear"></div>
        <div id="bottom">
            <div id="scrobbling"></div>
            <div id="lastfm-profile"></div>
            <div id="sync-history">
                <div id="sync-date-controls" style="margin-bottom: 10px;">
                    <label style="font-size: 12px; color: #666;">Sync from:</label>
                    <div style="margin-top: 5px;">
                        <input type="radio" id="sync-from-now" name="sync-date" value="now" checked>
                        <label for="sync-from-now" style="font-size: 12px;">Now (default)</label>
                    </div>
                    <div style="margin-top: 3px;">
                        <input type="radio" id="sync-from-date" name="sync-date" value="custom">
                        <label for="sync-from-date" style="font-size: 12px;">Custom date:</label>
                        <input type="date" id="custom-sync-date" style="margin-left: 5px; font-size: 11px;" disabled>
                    </div>
                </div>
                <button id="sync-history-btn">Sync History</button>
                <div id="sync-status" style="display: none; font-size: 12px; color: #666; margin-top: 5px;"></div>
            </div>
        </div>
    </div>
</body>
